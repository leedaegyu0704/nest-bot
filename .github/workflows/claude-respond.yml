name: Claude Respond

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

concurrency:
  group: claude-respond-${{ github.event.issue.number }}
  cancel-in-progress: ${{ github.event.sender.type != 'Bot' && !contains(github.event.sender.login, 'claude') && !contains(github.event.sender.login, '[bot]') }}

jobs:
  claude:
    if: |
      (
        (
          github.event_name == 'issues' &&
          contains(github.event.issue.body, '@claude') &&
          github.event.issue.user.type != 'Bot' &&
          !contains(github.event.issue.user.login, 'claude')
        ) ||
        (
          github.event_name == 'issue_comment' &&
          contains(github.event.comment.body, '@claude') &&
          github.event.comment.user.type != 'Bot' &&
          !contains(github.event.comment.user.login, 'claude') &&
          !startsWith(github.event.comment.body, '**Claude') &&
          !contains(github.event.comment.body, 'Claude Code is working')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Restore cached repos
        uses: actions/cache@v4
        with:
          path: workspace
          key: bb-repos-${{ github.run_id }}
          restore-keys: bb-repos-

      - name: Clone or update target repos
        env:
          ATLASSIAN_API_TOKEN: ${{ secrets.ATLASSIAN_API_TOKEN }}
          BITBUCKET_WORKSPACE: ${{ secrets.BITBUCKET_WORKSPACE }}
        run: |
          mkdir -p workspace && cd workspace
          REPOS="aj-nest-admin aj-nest-partners aj-platform-front aj-react-core aj-vue-core"
          ENC_TOKEN=$(jq -rn --arg v "$ATLASSIAN_API_TOKEN" '$v|@uri')
          for repo in $REPOS; do
            auth_url="https://x-bitbucket-api-token-auth:${ENC_TOKEN}@bitbucket.org/${BITBUCKET_WORKSPACE}/${repo}.git"
            clean_url="https://bitbucket.org/${BITBUCKET_WORKSPACE}/${repo}.git"
            if [ -d "$repo/.git" ]; then
              git -C "$repo" remote set-url origin "$auth_url"
              git -C "$repo" fetch --depth=1 --quiet origin && \
                git -C "$repo" reset --hard --quiet "origin/$(git -C "$repo" symbolic-ref --short refs/remotes/origin/HEAD | sed 's@^origin/@@')" || true
            else
              git clone --depth=1 --quiet "$auth_url" "$repo"
            fi
            git -C "$repo" remote set-url origin "$clean_url"
          done

      - name: Save repos cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: workspace
          key: bb-repos-${{ github.run_id }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Read,Glob,Grep,Bash(ls:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(find:*)"'
        env:
          REPO_WORKSPACE: ${{ github.workspace }}/workspace

      - name: Pick final Claude comment + Slack metadata
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          claude_body=$(gh api "/repos/$REPO/issues/$ISSUE_NUMBER/comments?per_page=100" | jq -r '
            [.[] | select(.user.login | test("claude"; "i")) | select(.body | startswith("**Claude finished"))]
            | last | .body // empty')

          if [ -z "$claude_body" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          issue_body=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json body -q .body)
          channel=$(echo "$issue_body" | grep -oE 'slack-channel:[^ ]+' | head -1 | cut -d: -f2)
          thread=$(echo "$issue_body" | grep -oE 'slack-thread:[^ ]+' | head -1 | cut -d: -f2)

          if [ -z "$channel" ] || [ -z "$thread" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi

          {
            echo "channel=$channel"
            echo "thread=$thread"
            echo "skip=false"
            echo "body<<__BODY_EOF__"
            echo "$claude_body"
            echo "__BODY_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Post answer to Slack
        if: steps.pick.outputs.skip != 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHANNEL: ${{ steps.pick.outputs.channel }}
          THREAD: ${{ steps.pick.outputs.thread }}
          COMMENT_BODY: ${{ steps.pick.outputs.body }}
        run: |
          stripped=$(echo "$COMMENT_BODY" \
            | sed -E '/^\*\*Claude finished/d' \
            | sed -E '/^---$/d' \
            | awk 'NF { found=1 } found')

          slack_text=$(echo "$stripped" \
            | sed -E 's/^#{1,6}[[:space:]]+(.*)$/*\1*/' \
            | sed -E 's/\*\*([^*]+)\*\*/*\1*/g' \
            | sed -E 's/~~([^~]+)~~/~\1~/g' \
            | sed -E 's/^[[:space:]]*[-*][[:space:]]+/• /' \
            | sed -E 's/\[([^]]+)\]\(([^)]+)\)/<\2|\1>/g' \
            | sed -E 's/[[:space:]]+$//')

          payload=$(jq -n \
            --arg channel "$CHANNEL" --arg thread "$THREAD" --arg text "$slack_text" \
            '{channel:$channel, thread_ts:$thread, text:$text, mrkdwn:true}')

          curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$payload"
