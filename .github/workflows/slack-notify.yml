name: Slack Notify

on:
  issue_comment:
    types: [edited]

jobs:
  notify:
    if: |
      contains(github.event.comment.user.login, 'claude') &&
      startsWith(github.event.comment.body, '**Claude finished')
    runs-on: ubuntu-latest
    steps:
      - name: Extract Slack thread info from issue body
        id: extract
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} --json body -q .body)
          channel=$(echo "$body" | grep -oE 'slack-channel:[^ ]+' | head -1 | cut -d: -f2)
          thread=$(echo "$body" | grep -oE 'slack-thread:[^ ]+' | head -1 | cut -d: -f2)
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "thread=$thread" >> "$GITHUB_OUTPUT"

      - name: Post answer to Slack thread
        if: steps.extract.outputs.channel != '' && steps.extract.outputs.thread != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHANNEL: ${{ steps.extract.outputs.channel }}
          THREAD: ${{ steps.extract.outputs.thread }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Strip claude-code-action header/footer, keep only answer between first --- and last ---
          clean=$(echo "$COMMENT_BODY" | awk '
            /^---$/ { if (!started) { started=1; next } else { exit } }
            started { print }
          ')
          payload=$(jq -n \
            --arg channel "$CHANNEL" \
            --arg thread "$THREAD" \
            --arg text "$clean" \
            '{channel:$channel, thread_ts:$thread, text:$text}')
          curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$payload"
