name: Slack Notify

on:
  issue_comment:
    types: [edited]

jobs:
  notify:
    if: |
      contains(github.event.comment.user.login, 'claude') &&
      startsWith(github.event.comment.body, '**Claude finished')
    runs-on: ubuntu-latest
    steps:
      - name: Extract Slack thread info from issue body
        id: extract
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} --json body -q .body)
          channel=$(echo "$body" | grep -oE 'slack-channel:[^ ]+' | head -1 | cut -d: -f2)
          thread=$(echo "$body" | grep -oE 'slack-thread:[^ ]+' | head -1 | cut -d: -f2)
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "thread=$thread" >> "$GITHUB_OUTPUT"

      - name: Post answer to Slack thread
        if: steps.extract.outputs.channel != '' && steps.extract.outputs.thread != ''
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHANNEL: ${{ steps.extract.outputs.channel }}
          THREAD: ${{ steps.extract.outputs.thread }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # 1) Strip claude-code-action header/footer (between first --- and next ---)
          stripped=$(echo "$COMMENT_BODY" | awk '
            /^---$/ { if (!started) { started=1; next } else { exit } }
            started { print }
          ')

          # 2) Convert GitHub Markdown -> Slack mrkdwn
          slack_text=$(echo "$stripped" | python3 -c '
import sys, re
t = sys.stdin.read()
# Headers (### / ## / #) -> *bold*
t = re.sub(r"^#{1,6}\s+(.*)$", r"*\1*", t, flags=re.M)
# Bold **x** -> *x* (avoid touching code blocks is hard; do simple pass)
t = re.sub(r"\*\*(.+?)\*\*", r"*\1*", t)
# Italic *x* would clash with bold; skip to keep safe
# Bullet list "- x" or "* x" -> "• x"
t = re.sub(r"^\s*[-*]\s+", "• ", t, flags=re.M)
# Numbered list keep as-is (Slack handles okay)
# Links [text](url) -> <url|text>
t = re.sub(r"\[([^\]]+)\]\(([^)]+)\)", r"<\2|\1>", t)
# Strikethrough ~~x~~ -> ~x~
t = re.sub(r"~~(.+?)~~", r"~\1~", t)
# Strip extra trailing whitespace
t = re.sub(r"[ \t]+$", "", t, flags=re.M)
sys.stdout.write(t.strip())
')

          payload=$(jq -n \
            --arg channel "$CHANNEL" \
            --arg thread "$THREAD" \
            --arg text "$slack_text" \
            '{channel:$channel, thread_ts:$thread, text:$text, mrkdwn:true}')
          curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$payload"
